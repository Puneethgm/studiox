# Production stack for Project-X. Run on the EC2 box from this directory:
#
#   docker compose up -d                    # bring up postgres + api + web + nginx
#   docker compose --profile tools run --rm migrate   # apply migrations
#   docker compose --profile tools run --rm seed      # seed/refresh super admin
#   docker compose logs -f                  # tail logs
#
# Most of the time you'll just run ../deploy.sh from the repo root which
# does pull → build → migrate → seed → up in one shot.

name: projectx

# Env shared by every Go-API-based service (api + seed). Migrate doesn't
# need it because the DSN is on the goose command line.
x-api-env: &api_env
  API_HTTP_ADDR: ":8080"
  API_ENV: production
  API_LOG_LEVEL: info
  API_CORS_ORIGINS: ${PUBLIC_FORM_BASE_URL}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_SSLMODE: disable
  JWT_SECRET: ${JWT_SECRET}
  JWT_TTL_HOURS: "24"
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
  COOKIE_NAME: px_session
  COOKIE_DOMAIN: ${COOKIE_DOMAIN}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  PUBLIC_FORM_BASE_URL: ${PUBLIC_FORM_BASE_URL}
  GOOGLE_CREDENTIALS_PATH: /secrets/google-credentials.json
  GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
  GOOGLE_SHEETS_TAB: ${GOOGLE_SHEETS_TAB:-Leads}
  TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
  META_APP_ID: ${META_APP_ID:-}
  META_APP_SECRET: ${META_APP_SECRET:-}
  META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
  META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v21.0}

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

  # One-shot: run migrations.
  migrate:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    image: projectx-api:local
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/goose"]
    command:
      - "-dir"
      - "/migrations"
      - "postgres"
      - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      - "up"
    restart: "no"

  # One-shot: upsert the super-admin from env (idempotent).
  seed:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    image: projectx-api:local
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment: *api_env
    entrypoint: ["/usr/local/bin/seed"]
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    image: projectx-api:local
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment: *api_env
    volumes:
      - ./secrets:/secrets:ro

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        API_BASE_URL: http://api:8080
    image: projectx-web:local
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      API_BASE_URL: http://api:8080
      # Server-side fetches (RSC) hit the API on the docker-internal network.
      # Browser fetches use relative paths and go through nginx.

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api

volumes:
  pg_data:
