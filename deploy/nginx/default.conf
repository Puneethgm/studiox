# Single-server reverse proxy.
#   /api/*  → Go API container
#   /*      → Next.js container
#
# Same-origin from the browser's view, so the frontend's relative `/api/*`
# fetches "just work" without CORS dancing.

upstream projectx_api {
    server api:8080;
    keepalive 32;
}

upstream projectx_web {
    server web:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Reasonable defaults
    client_max_body_size 16m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;

    # Health check (delegates to the Go API).
    location = /health {
        proxy_pass http://projectx_api/health;
        access_log off;
    }

    # API → Go service. Bypasses Next.js entirely.
    location /api/ {
        proxy_pass http://projectx_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Everything else → Next.js. Includes _next/static (long-cached by Next).
    location / {
        proxy_pass http://projectx_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (Next.js dev / HMR doesn't run in prod, but harmless).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
